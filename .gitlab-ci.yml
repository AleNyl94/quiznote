image: node:20

stages:
  - build
  - test
  - deploy

build-job:
  stage: build
  script:
    - cd server
    - npm ci --legacy-peer-deps
  artifacts:
    paths:
      - server/node_modules/

test-job:
  stage: test
  script:
    - cd server
    - npm run lint
    - npm test
    - cd ..
    - cd client
    - npm ci
    - npm run lint
    - npm test

  dependencies:
    - build-job

system-test:
  stage: test
  script:
    - npm install 
    - cd client && npm ci && cd .. 
    - npx playwright test tests/
  artifacts:
    together: true
    when: always
    paths:
      - playwright-report/

deploy-job:
  stage: deploy
  script:
    - echo "Deploying to production server..."
  when: manual
  only:
    - main