image: node:20

stages:
  - build
  - test
  - deploy

build-job:
  stage: build
  script:
    - cd server
    - npm ci
  artifacts:
    paths:
      - server/node_modules/

test-job:
  stage: test
  script:
    - cd server
    - npm run eslint
    - npm test
    - npm test
    - cd ..
    - cd client
    - npm ci
    - npm run lint   # Om du har lint-script i client/package.json
    - npm test

  dependencies:
    - build-job

deploy-job:
  stage: deploy
  script:
    - echo "Deploying to production server..."
  when: manual
  only:
    - main