image: node:20

stages:
  - build
  - test
  - deploy

build-job:
  stage: build
  script:
    - cd server
    - npm ci --legacy-peer-deps
  artifacts:
    paths:
      - server/node_modules/

test-job:
  stage: test
  script:
    - cd server
    - npm run lint
    - npm test
    - cd ..
    - cd client
    - npm ci
    - npm run lint
    - npm test

  dependencies:
    - build-job

system-test:
  stage: test
  services:
    - name: mongo:latest
      alias: mongo
  variables:
    MONGO_URI: "mongodb://localhost:27017/Quiznote"
    NODE_ENV: test
  script:
   - npm install --legacy-peer-deps
   - cd server
   - npm install --legacy-peer-deps
   - node server.js &
   - cd ..
   - sleep 5
   - npx playwright install --with-deps chromium
   - npx playwright test tests/ --project=chromium
  artifacts:
    when: always
    paths:
      - playwright-report/
  dependencies:
    - build-job

deploy-job:
  stage: deploy
  script:
    - echo "Deploying to production server..."
  when: manual
  only:
    - main