name: Node.js CI

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Linter (Kodkvalitet)
      run: npm run lint
    - name: Run Tests
      run: npm test

    - name: Security Scan (npm audit)
      run: npm audit --audit-level=high