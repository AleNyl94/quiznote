name: Node.js CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  client-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Pull code from github
      uses: actions/checkout@v4

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'client/package-lock.json'

    - name: Install packages and test client
      run: |
        cd client
        npm ci
        npm test -- run

  server-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Pull code from github
      uses: actions/checkout@v4

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'server/package-lock.json'

    - name: Install packages and run tests in server
      run: |
        cd server
        npm ci
        npm test